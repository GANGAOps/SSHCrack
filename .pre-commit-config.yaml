# .pre-commit-config.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Pre-commit hooks for ssh-crack
#
# Install:
#   pip install pre-commit
#   pre-commit install          # installs git hooks
#   pre-commit install --hook-type commit-msg   # conventional commits check
#
# Run manually against all files:
#   pre-commit run --all-files
#
# Update hooks to latest versions:
#   pre-commit autoupdate
# ─────────────────────────────────────────────────────────────────────────────

default_language_version:
  python: python3.12

default_stages: [commit, push]

repos:

  # ── Built-in hooks ──────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]          # allow custom YAML tags
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]       # block large accidental commits
      - id: check-case-conflict
      - id: detect-private-key    # block accidental SSH key commits
      - id: no-commit-to-branch
        args: [--branch=main]     # require PRs for main
      - id: mixed-line-ending
        args: [--fix=lf]

  # ── ruff — fast linter + auto-fixer ────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi, jupyter]
      - id: ruff-format

  # ── black — formatter ───────────────────────────────────────────────────────
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
        language_version: python3.12

  # ── isort — import sorting ──────────────────────────────────────────────────
  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: [--profile=black, --line-length=100]

  # ── mypy — type checking ────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies:
          - cryptography>=42.0
          - numpy>=1.26
        args: [--ignore-missing-imports, --no-error-summary]
        files: ^sshcrack/(parser|engine|session)\.py$   # strict on core modules only

  # ── bandit — security SAST ──────────────────────────────────────────────────
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.9
    hooks:
      - id: bandit
        args:
          - -r
          - sshcrack/
          - -ll                    # minimum severity: LOW (show all)
          - --severity-level=medium # fail on MEDIUM+
          - -q
        exclude: tests/

  # ── interrogate — docstring coverage ───────────────────────────────────────
  - repo: https://github.com/econchick/interrogate
    rev: 1.7.0
    hooks:
      - id: interrogate
        args: [--fail-under=70, -v, --ignore-init-method, --ignore-magic]
        files: ^sshcrack/
        exclude: ^sshcrack/(gpu/opencl_kernel|gpu/cuda_kernel)

  # ── conventional commits ────────────────────────────────────────────────────
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.2.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          - feat      # new feature
          - fix       # bug fix
          - perf      # performance improvement
          - refactor  # code restructure
          - test      # test changes
          - docs      # documentation
          - chore     # maintenance
          - ci        # CI/CD changes
          - security  # security fix

  # ── commitizen — version bumping ───────────────────────────────────────────
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v3.27.0
    hooks:
      - id: commitizen
        stages: [commit-msg]
